<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RingRaceViewer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard">

  <!-- Splash screen — shown for 5 seconds on boot -->
  <div id="splash" class="splash">
    <div class="splash-text">
      <span class="splash-ring">Ring</span><span class="splash-race">Race</span><span class="splash-viewer">Viewer</span>
    </div>
  </div>

  <div id="grid" class="dashboard-grid" style="display:none;"></div>

  <img id="dashboard-logo" class="dashboard-logo" src="" alt="" style="display:none">

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
